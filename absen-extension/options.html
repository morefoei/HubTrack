<!DOCTYPE html>
<html>
<head>
    <title>Pengaturan Auto Absen</title>
    <meta charset="utf-8">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --success: #10b981;
            --success-hover: #059669;
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            width: 340px; 
            margin: 0; 
        }
        .header {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.1));
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header img {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        h2 { 
            margin: 0; 
            font-size: 1.25rem; 
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container {
            padding: 20px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 0.9rem;
            color: #cbd5e1; 
        }
        input[type="number"], input[type="time"] { 
            width: 100%; 
            padding: 12px; 
            background-color: #0f172a;
            border: 1px solid var(--border); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px; 
            color: white;
            transition: all 0.2s ease;
        }
        input:focus { 
            outline: none; 
            border-color: #60a5fa; 
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2); 
        }
        .help-text { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            margin-top: 6px; 
            line-height: 1.4;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 25px;
        }
        button { 
            width: 100%;
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.95rem; 
            cursor: pointer; 
            font-weight: 600; 
            color: white;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        #saveBtn { 
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.25);
        }
        #saveBtn:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }
        #saveBtn:active {
            transform: translateY(1px);
        }
        #testBtn { 
            background: rgba(16, 185, 129, 0.1); 
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        #testBtn:hover { 
            background: rgba(16, 185, 129, 0.2); 
        }
        .status { 
            margin-top: 15px; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.85rem;
            display: none; 
            text-align: center;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        .status.success { 
            background-color: rgba(16, 185, 129, 0.15); 
            color: #34d399; 
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: block; 
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
            cursor: pointer;
        }
        ::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icon.png" alt="Logo">
        <h2>Auto Absen Sync</h2>
    </div>
    
    <div class="container">
        <div class="form-group">
            <label for="alarmDate">Tanggal Eksekusi (Bulanan)</label>
            <input type="number" id="alarmDate" min="1" max="31" placeholder="Contoh: 19 (Opsional)">
            <div class="help-text">Jika diisi (misal: 19), ekstensi hanya berjalan di tanggal tersebut. Kosongkan jika ingin berjalan setiap hari.</div>
        </div>

        <div class="form-group">
            <label for="alarmTime">Waktu Eksekusi</label>
            <input type="time" id="alarmTime" value="08:00" required>
            <div class="help-text">Jam berapa ekstensi ini harus berjalan di latar belakang?</div>
        </div>
        
        <div class="btn-container">
            <button id="saveBtn">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                Simpan Pengaturan
            </button>
            <button id="testBtn">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Jalankan Test Run
            </button>
        </div>
        
        <div id="statusMsg" class="status"></div>
    </div>

    <script src="options.js"></script>
</body>
</html>
