stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:latest
  script:
    # --- TAMBAHKAN BARIS INI SEBAGAI SOLUSI SEMENTARA ---
    - echo "nameserver 8.8.8.8" > /etc/resolv.conf
    # ----------------------------------------------------
    
    - apk add --no-cache lftp
    
    # Menggunakan regex (--exclude) yang dibungkus tanda kutip tunggal agar lebih aman
    - lftp -c "set ftp:ssl-allow no; open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER; mirror -Rnv ./ /htdocs --ignore-time --parallel=10 --no-perms --exclude '^\.git/' --exclude '\.gitlab-ci\.yml$' --exclude 'admin_notes\.txt$' --exclude 'ARCHITECTURE\.md$'"
  only:
    - main